---
# =====================================================
# Install Jenkins on CI Master
# =====================================================
- name: Install Jenkins on Master
  hosts: master
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 21 and required packages
      apt:
        name:
          - openjdk-21-jdk
          - fontconfig
          - wget
          - curl
          - gnupg
        state: present

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Jenkins 2026 GPG key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add Jenkins repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Enable Jenkins
      systemd:
        name: jenkins
        enabled: yes

    - name: Start Jenkins
      systemd:
        name: jenkins
        state: started

# =====================================================
# Install Docker on CI Agent
# =====================================================
- name: Install Docker on Agent
  hosts: agent
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 21
      apt:
        name: openjdk-21-jdk
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable Docker
      systemd:
        name: docker
        enabled: yes

    - name: Start Docker
      systemd:
        name: docker
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
